name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  TERRAFORM_VERSION: "1.9.8"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Format check
        run: terraform -chdir=infra fmt -check -recursive
      - name: Create placeholder Lambda artifacts
        # filebase64sha256() needs the zips to exist; contents are irrelevant
        # for validation.
        run: |
          mkdir -p dist
          for artifact in layer ingest alert; do
            echo placeholder > "dist/${artifact}.txt"
            (cd dist && zip -q "${artifact}.zip" "${artifact}.txt")
          done
      - name: Init (no backend)
        run: terraform -chdir=infra init -backend=false
      - name: Validate
        run: terraform -chdir=infra validate

  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: [lint, test, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Package Lambda artifacts
        run: make package PYTHON=python3.12
      - name: Terraform init
        run: >
          terraform -chdir=infra init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=serverless-etl/terraform.tfstate"
          -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -input=false
